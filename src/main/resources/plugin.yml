name: BuyerPlugin
version: '${project.version}'
main: com.buyerplugin.BuyerPlugin
api-version: '1.21'
description: Байер — магазин ресурсов с серверными лимитами
authors: [YourName]
depend: [Vault]

commands:
  buyer:
    description: Открыть магазин Байера
    usage: /buyer
    permission: buyer.use
    aliases: [shop, магазин]

permissions:
  buyer.use:
    description: Разрешает открыть магазин Байера
    default: true
  buyer.admin:
    description: Доступ к административным командам Байера
    default: op
